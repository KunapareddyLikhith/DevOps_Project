version: "3.8"

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - secure-network
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - secure-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    working_dir: /backend
    env_file:
      - ./backend/.env
    networks:
      - secure-network

networks:
  secure-network:
    driver: bridge



